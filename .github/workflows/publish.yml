name: Publish to npm

on:
  release:
    types: [published]
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci || npm install

      - name: Validate package name
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          if [ "$PKG_NAME" != "@dion-jy/rondo" ]; then
            echo "::error::Unexpected package name: $PKG_NAME"
            exit 1
          fi

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish (skip if already published)
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@dion-jy/rondo@$PKG_VERSION" version 2>/dev/null; then
            echo "Version $PKG_VERSION already published — skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
